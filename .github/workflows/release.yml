name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-release-assets:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DuckDnsUpdater.sln

      - name: Build
        run: dotnet build DuckDnsUpdater.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DuckDnsUpdater.sln --configuration Release --no-build --verbosity normal

      - name: Publish win-x64 single-file
        run: >
          dotnet publish DuckDnsUpdater.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          /p:DebugSymbols=false
          --output artifacts/win-x64

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag) -or $tag -eq "refs/heads/master") {
            $tag = "manual"
          }

          $zipName = "DuckDnsUpdater-win-x64-$tag.zip"
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath "artifacts/$zipName" -Force

          $hash = Get-FileHash -Path "artifacts/$zipName" -Algorithm SHA256
          "$($hash.Hash)  $zipName" | Set-Content -Encoding ascii "artifacts/$zipName.sha256.txt"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdnsupdater-win-x64-${{ github.ref_name }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256.txt

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.sha256.txt
